<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Expert System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1><i class="fa-solid fa-traffic-light"></i> Traffic Signal Expert System</h1>
    <p class="subtitle">Adaptive Traffic Signal Control &mdash; University of Ghana</p>

    <form action="/evaluate" method="POST">

      <div class="form-group">
        <label for="density"><i class="fa-solid fa-gauge"></i> Traffic Density</label>
        <select id="density" name="density" required>
          <option value="" disabled selected>Select density</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="form-group">
        <label for="weather"><i class="fa-solid fa-cloud-sun"></i> Weather Condition</label>
        <select id="weather" name="weather" required>
          <option value="" disabled selected>Select weather</option>
          <option value="dry">Dry</option>
          <option value="light_rain">Light Rain</option>
          <option value="heavy_rain">Heavy Rain</option>
          <option value="cloudy">Cloudy</option>
        </select>
      </div>

      <div class="form-group">
        <label for="time"><i class="fa-solid fa-clock"></i> Time of Day</label>
        <select id="time" name="time" required>
          <option value="" disabled selected>Select time</option>
          <option value="day">Day</option>
          <option value="night">Night</option>
        </select>
      </div>

      <div class="form-group">
        <label for="light"><i class="fa-solid fa-traffic-light"></i> Current Traffic Light</label>
        <select id="light" name="light" required>
          <option value="" disabled selected>Select light state</option>
          <option value="red">Red</option>
          <option value="yellow">Yellow</option>
          <option value="green">Green</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pedestrian"><i class="fa-solid fa-person-walking"></i> Pedestrian Presence</label>
        <select id="pedestrian" name="pedestrian" required>
          <option value="" disabled selected>Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="form-group">
        <label for="emergency"><i class="fa-solid fa-truck-medical"></i> Emergency Vehicle Present</label>
        <select id="emergency" name="emergency" required>
          <option value="" disabled selected>Select</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <button type="submit"><i class="fa-solid fa-bolt"></i> Evaluate</button>
    </form>
  </div>
</body>
</html>
